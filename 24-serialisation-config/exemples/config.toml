# Configuration du serveur d'API

[server]
host = "0.0.0.0"
port = 8080
workers = 4
debug = false

[server.tls]
cert_path = "/etc/ssl/server.crt"
key_path = "/etc/ssl/server.key"
verify_client = true

[database]
host = "db.internal"
port = 5432
name = "production"
connection_pool = 20
query_timeout_ms = 5000

[[server.endpoints]]
path = "/health"
method = "GET"
timeout_ms = 1000

[[server.endpoints]]
path = "/api/data"
method = "POST"
timeout_ms = 5000

[logging]
level = "info"
outputs = ["stdout", "/var/log/api/server.log"]

[deployment]
created_at = 2026-03-14T10:30:00Z
release_date = 2026-03-14
backup_time = 03:00:00
